<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 هذه الصفحة غير موجودة</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      color-scheme: light;
      --bg: #eef3f8;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-border: rgba(148, 163, 184, 0.2);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.1);
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      font-family: "Noto Kufi Arabic", "Cairo", "Tajawal", "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top, rgba(15, 118, 110, 0.08), transparent 32%),
        linear-gradient(180deg, #f7fafc 0%, var(--bg) 100%);
      color: var(--text);
    }

    .screen {
      width: min(100%, 420px);
      padding: 14px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.48);
      background: rgba(255, 255, 255, 0.42);
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(18px);
    }

    .box {
      text-align: center;
      padding: 22px 18px 18px;
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      background: var(--panel);
      backdrop-filter: blur(14px);
    }

    .status {
      margin: 0;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 8px;
      line-height: 1.55;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 700;
      color: var(--text);
    }

    p {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.75;
      color: var(--muted);
    }

    .meta {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(226, 232, 240, 0.95);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      margin: 0 auto;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .dots {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.34);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: 0.18s;
    }

    .dots span:nth-child(3) {
      animation-delay: 0.36s;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(0.9);
        opacity: 0.45;
      }

      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .screen {
        border-radius: 22px;
        padding: 10px;
      }

      .box {
        padding: 18px 14px 14px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="box">
      <p class="status">404</p>
      <h1>هذه الصفحة غير موجودة</h1>
      <p>قد يكون الرابط غير صحيح أو أن الصفحة تم نقلها. سنعيدك إلى الصفحة الرئيسية تلقائيًا.</p>
      <div class="meta">
        <div class="pill">العودة إلى الرئيسية خلال 3 ثوانٍ</div>
        <div class="dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </div>
  <script>
    setTimeout(function () { window.location.href = "/"; }, 3000);
  </script>
</body>
</html>
