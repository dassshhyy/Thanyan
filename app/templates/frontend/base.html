<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}FastAPI Base{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/webp" href="/static/frontend/images/logo.webp" />
  <link rel="apple-touch-icon" href="/static/frontend/images/logo.webp" />
  <link rel="manifest" href="/static/frontend/images/favicon/site.webmanifest" />
  <meta name="theme-color" content="#0f766e" />
  <link rel="stylesheet" href="/static/frontend/css/main.css?v=20260329-104" />
  {% block extra_head %}{% endblock %}
</head>
<body class="frontend-body" data-heartbeat-interval-ms="{{ heartbeat_interval_seconds * 1000 }}">
  {% block content %}{% endblock %}
  <script src="/static/frontend/js/main.js?v=20260329-104" defer></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
